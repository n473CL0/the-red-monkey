name: Update and Deploy

on:
  schedule:
    - cron: '0 12 * * *'
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python tools
        run: pip install requests beautifulsoup4

      - name: Run Python script
        run: python update_beers.py

      - name: Save new data
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add _data/beers.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update beer list" && git push)

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      # We install Jekyll and the plugin directly instead of using a Gemfile
      - name: Install Jekyll and Plugins
        run: gem install jekyll jekyll-datapage-generator

      - name: Set up GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      # We run standard jekyll build instead of bundle exec
      - name: Build the site
        run: jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Prepare files for upload
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish to the web
        id: deployment
        uses: actions/deploy-pages@v4