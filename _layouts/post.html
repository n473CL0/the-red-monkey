---
layout: default
---
<div class="inner-layout">
  <aside class="inner-sidebar">
    <div class="beer-drawing">
      {% include beer-drawing.svg %}
    </div>
    <p class="beer-caption">{{ page.beer_caption | default: "A fine pint, pulled with care." }}</p>
  </aside>

  <div class="inner-content">
    <article class="post">
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %-d, %Y" }}
        </time>
      </header>
      <div class="post-body">
        {{ content }}
      </div>
    </article>
  </div>
</div>
