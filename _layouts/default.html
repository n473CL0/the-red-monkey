<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Open+Sans:wght@400;600&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  </head>
  <body{% if page.body_class %} class="{{ page.body_class }}"{% elsif layout.body_class %} class="{{ layout.body_class }}"{% endif %}>
    <header class="site-header">
      <a href="{{ "/" | relative_url }}" class="site-title" aria-label="{{ site.title }}">
        THE RED MONKEY
      </a>
    </header>

    <main>
      {{ content }}
    </main>

    <nav class="taps-stage" aria-label="Site navigation">
      <a href="{{ site.links.beers }}" class="tap-link" aria-label="Beers" target="_blank" rel="noopener noreferrer">
        <div class="tap">
          <div class="tap-grip"></div>
          <div class="tap-stem tap-stem--top"></div>
          <div class="tap-badge-wrap">
            <div class="tap-badge">Beers</div>
          </div>
          <div class="tap-stem tap-stem--bottom"></div>
        </div>
      </a>
      <a href="{{ site.links.facebook }}" class="tap-link" aria-label="Facebook" target="_blank" rel="noopener noreferrer">
        <div class="tap">
          <div class="tap-grip"></div>
          <div class="tap-stem tap-stem--top"></div>
          <div class="tap-badge-wrap">
            <div class="tap-badge">Facebook</div>
          </div>
          <div class="tap-stem tap-stem--bottom"></div>
        </div>
      </a>
      <a href="{{ site.links.instagram }}" class="tap-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
        <div class="tap">
          <div class="tap-grip"></div>
          <div class="tap-stem tap-stem--top"></div>
          <div class="tap-badge-wrap">
            <div class="tap-badge">Instagram</div>
          </div>
          <div class="tap-stem tap-stem--bottom"></div>
        </div>
      </a>
      <a href="{{ "/about/" | relative_url }}" class="tap-link" aria-label="About">
        <div class="tap">
          <div class="tap-grip"></div>
          <div class="tap-stem tap-stem--top"></div>
          <div class="tap-badge-wrap">
            <div class="tap-badge">About</div>
          </div>
          <div class="tap-stem tap-stem--bottom"></div>
        </div>
      </a>
      <div class="tap-font-bar"></div>
    </nav>

    <div class="mobile-tap-wrapper">
      <nav class="mobile-tap-nav" aria-label="Mobile navigation">
        <button class="mobile-tap-toggle" aria-expanded="false" aria-controls="mobile-menu">
          <div class="tap">
            <div class="tap-grip"></div>
            <div class="tap-stem tap-stem--top"></div>
            <div class="tap-badge-wrap">
              <div class="tap-badge">Explore</div>
            </div>
            <div class="tap-stem tap-stem--bottom"></div>
          </div>
        </button>
        <div class="tap-font-bar"></div>
      </nav>
      <div class="mobile-menu" id="mobile-menu">
        <a href="{{ site.links.beers }}" class="mobile-menu-link" target="_blank" rel="noopener noreferrer">Beers</a>
        <a href="{{ site.links.facebook }}" class="mobile-menu-link" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="{{ site.links.instagram }}" class="mobile-menu-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="{{ "/about/" | relative_url }}" class="mobile-menu-link">About</a>
      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-address">
          <strong>Address</strong>
          <address>
            <a href="{{ site.contact.maps_url }}" target="_blank" rel="noopener noreferrer">
              {{ site.contact.address_line1 }}<br>
              {{ site.contact.address_line2 }}<br>
              {{ site.contact.postcode }}
            </a>
          </address>
        </div>
        <div class="footer-contact">
          <strong>Contact</strong>
          <p>
            Tel: <a href="tel:{{ site.contact.phone | remove: ' ' }}">{{ site.contact.phone }}</a>
          </p>
        </div>
      </div>
    </footer>

    <script>
      // Mobile tap menu toggle
      const mobileToggle = document.querySelector('.mobile-tap-toggle');
      const mobileMenu = document.querySelector('.mobile-menu');
      
      if (mobileToggle && mobileMenu) {
        mobileToggle.addEventListener('click', function() {
          const isExpanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !isExpanded);
          mobileMenu.classList.toggle('mobile-menu--open');
          this.classList.toggle('mobile-tap-toggle--active');
        });
      }
    </script>
  </body>
</html>
