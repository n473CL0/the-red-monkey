<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Open+Sans:wght@400;600&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a href="{{ "/" | relative_url }}" class="site-title">THE RED MONKEY</a>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-address">
          <strong>Address</strong>
          <address>
            14 Barrel Lane<br>
            Hopsworth<br>
            HW1 4PB
          </address>
        </div>
        <div class="footer-contact">
          <strong>Contact</strong>
          <p>
            Tel: 01234 567890<br>
            Email: <a href="mailto:hello@theredmonkey.pub">hello@theredmonkey.pub</a>
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
