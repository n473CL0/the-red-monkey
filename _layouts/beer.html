---
layout: default
---
<div class="inner-layout">
  <aside class="inner-sidebar">
    <div class="beer-drawing">
      {% if page.image %}
        <img src="{{ page.image }}" alt="A pint of {{ page.name }}" class="beer-photo">
      {% else %}
        <div class="beer-colour-fill" style="background-color: {{ page.color }}; -webkit-mask-image: url('{{ "/assets/beer_inside.png" | relative_url }}'); mask-image: url('{{ "/assets/beer_inside.png" | relative_url }}');"></div>
        <img src="{{ "/assets/beer_outline.png" | relative_url }}" alt="A pint of {{ page.name }}" class="beer-outline-img">
      {% endif %}
    </div>
    <p class="beer-caption">{{ page.notes }}</p>
  </aside>

  <div class="inner-content">
    <article class="beer-detail">
      <header class="beer-header">
        <h1>{{ page.beer_name }}</h1>
        <p class="beer-style">{{ page.details }}</p>
      </header>

      <div class="beer-stats">
        <div class="beer-stat">
          <span class="beer-stat-label">Brewery</span>
          <span class="beer-stat-value">{{ page.brewery }}</span>
        </div>
        <div class="beer-stat">
          <span class="beer-stat-label">Style &amp; ABV</span>
          <span class="beer-stat-value">{{ page.details }}</span>
        </div>
      </div>

      {% if page.notes %}
      <div class="beer-tasting-notes">
        <h3>Tasting Notes</h3>
        <p>{{ page.notes }}</p>
      </div>
      {% endif %}
    </article>
  </div>
</div>
