---
layout: default
---
<div class="inner-layout">
  <aside class="inner-sidebar">
    <div class="beer-drawing">
      {% include beer-drawing.svg %}
    </div>
    <p class="beer-caption">{{ page.beer_caption | default: "A fine pint, pulled with care." }}</p>
  </aside>

  <div class="inner-content">
    <article class="post event-post">
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.event_date %}
        <time class="post-date">{{ page.event_date }}</time>
        {% endif %}
        {% if page.venue %}
        <p class="event-venue">{{ page.venue }}</p>
        {% endif %}
      </header>
      <div class="post-body">
        {{ content }}
      </div>
    </article>
  </div>
</div>
