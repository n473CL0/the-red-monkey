---
layout: default
---
{% assign random_beer = site.beers | sample %}
<div class="inner-layout">
  <aside class="inner-sidebar">
    <a href="{{ random_beer.url | relative_url }}" class="beer-link">
      <div class="beer-drawing">
        <div class="beer-colour-fill" style="background-color: {{ random_beer.color_hex | default: '#D67B48' }}; -webkit-mask-image: url('{{ "/assets/beer_inside.png" | relative_url }}'); mask-image: url('{{ "/assets/beer_inside.png" | relative_url }}');"></div>
        <img src="{{ "/assets/beer_outline.png" | relative_url }}" alt="A pint of {{ random_beer.name }}" class="beer-outline-img">
      </div>
      <p class="beer-caption">{{ random_beer.name }} — {{ random_beer.description }}</p>
    </a>
  </aside>

  <div class="inner-content">
    <article class="post event-post">
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.event_date %}
        <time class="post-date">{{ page.event_date }}</time>
        {% endif %}
        {% if page.venue %}
        <p class="event-venue">{{ page.venue }}</p>
        {% endif %}
      </header>
      <div class="post-body">
        {{ content }}
      </div>
    </article>
  </div>
</div>
