<svg class="beer-svg" viewBox="0 0 160 280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Pint glass body -->
  <path d="M 45 60 L 30 240 L 130 240 L 115 60 Z" class="glass-body" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Glass rim -->
  <ellipse cx="80" cy="60" rx="35" ry="8" class="glass-rim" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Beer fill -->
  <path d="M 47 90 L 33 240 L 127 240 L 113 90 Z" class="beer-fill"/>
  <!-- Foam top -->
  <ellipse cx="80" cy="90" rx="33" ry="10" class="foam-base"/>
  <!-- Foam bubbles -->
  <circle cx="65" cy="84" r="9" class="foam-bubble"/>
  <circle cx="80" cy="80" r="11" class="foam-bubble"/>
  <circle cx="95" cy="84" r="9" class="foam-bubble"/>
  <circle cx="73" cy="78" r="7" class="foam-bubble"/>
  <circle cx="88" cy="77" r="7" class="foam-bubble"/>
  <!-- Bubble details inside glass -->
  <circle cx="70" cy="160" r="2" class="bubble" opacity="0.5"/>
  <circle cx="85" cy="130" r="1.5" class="bubble" opacity="0.4"/>
  <circle cx="95" cy="180" r="1.5" class="bubble" opacity="0.4"/>
  <circle cx="75" cy="200" r="2" class="bubble" opacity="0.3"/>
  <!-- Glass highlight -->
  <path d="M 50 80 L 38 220" class="glass-highlight" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
</svg>
